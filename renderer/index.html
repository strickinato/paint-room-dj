<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'">
  <title>paint-room-dj</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <h1>paint-room-dj</h1>

    <div id="project-section">
      <b>Project</b>
      <br>
      <span id="project-dir-name"></span>
      <button id="btn-change-project">Change</button>
    </div>

    <hr>

    <button id="btn-reload-all">Reload All</button>
    <button id="btn-kill-audio">KILL AUDIO</button>
    <button id="btn-send-colors">Send Colors</button>

    <hr>

    <div id="audio-section">
      <b>Audio Out</b>
      <br>
      <select id="audio-device-select">
        <option value="">-- default --</option>
      </select>
    </div>

    <hr>

    <div id="midi-section">
      <b>MIDI In</b>
      <span id="midi-status-dot" class="status-dot"></span>
      <br>
      <select id="midi-device-select">
        <option value="">-- select device --</option>
      </select>
      <br>
      <span id="midi-device-name"></span>
      <details>
        <summary>log</summary>
        <pre id="midi-log"></pre>
      </details>
    </div>
  </div>
  <div id="main">
    <div id="grids"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
