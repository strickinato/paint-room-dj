<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'">
  <title>paint-room-dj</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">

    <div id="controls-section">
      <button id="btn-play-stop">Play</button>
      <button id="btn-reload-all">Reload All</button>
    </div>

    <hr>

    <details id="project-section">
      <summary><b>Project</b> <span id="project-dir-summary"></span></summary>
      <span id="project-dir-name"></span>
      <br>
      <button id="btn-change-project">Change</button>
      <div id="preset-section">
        <b>Presets</b>
        <div id="preset-controls">
          <input id="preset-name-input" type="text" placeholder="preset name">
          <button id="btn-add-preset">+</button>
        </div>
        <div id="preset-list"></div>
      </div>
    </details>

    <hr>

    <details id="view-settings-section">
      <summary><b>View</b></summary>
      <div id="theme-section">
        Theme: <button id="btn-theme">Auto</button>
      </div>
      <div id="view-section">
        Layout: <button id="btn-view-mode">All Banks</button>
      </div>
    </details>

    <hr>

    <details id="audio-section">
      <summary><b>Audio</b> <span id="audio-device-summary"></span></summary>
      <select id="audio-device-select">
        <option value="">-- default --</option>
      </select>
    </details>

    <hr>

    <details id="midi-section">
      <summary><b>MIDI</b> <span id="midi-status-dot" class="status-dot"></span><span id="midi-activity-dot" class="activity-dot"></span></summary>
      <span id="midi-device-name"></span>
      <br>
      <select id="midi-device-select">
        <option value="">-- select device --</option>
      </select>
    </details>

    <hr>

    <details id="media-section">
      <summary><b>Media</b></summary>
      <div id="media-list"></div>
    </details>

    <hr>

    <details id="effects-section">
      <summary><b>Effects</b></summary>
      <button id="btn-autoload-effects">Auto-load bank 4</button>
      <div id="effects-list"></div>
    </details>

    <hr>

    <details id="advanced-section">
      <summary><b>Advanced</b></summary>
      <details id="midi-log-section">
        <summary>MIDI Log</summary>
        <pre id="midi-log"></pre>
      </details>
    </details>
  </div>
  <div id="main">
    <div id="bank-tabs" style="display:none">
      <button class="bank-tab active" data-bank="0">Bank 1</button>
      <button class="bank-tab" data-bank="1">Bank 2</button>
      <button class="bank-tab" data-bank="2">Bank 3</button>
      <button class="bank-tab" data-bank="3">Bank 4</button>
    </div>
    <div id="grids"></div>
  </div>
  <div id="branding">Paint Room DJ &middot; strickinato</div>
  <script src="renderer.js"></script>
</body>
</html>
